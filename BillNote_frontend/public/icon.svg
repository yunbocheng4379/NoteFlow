<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="114" fill="url(#bggrad)"/>

  <!-- Inner subtle gradient overlay for depth -->
  <rect width="512" height="512" rx="114" fill="url(#toplight)" opacity="0.18"/>

  <!-- Main document / note card -->
  <rect x="124" y="88" width="220" height="272" rx="22" fill="white"/>

  <!-- Three text lines on the note -->
  <rect x="154" y="148" width="130" height="11" rx="5.5" fill="#99e6de"/>
  <rect x="154" y="176" width="108" height="11" rx="5.5" fill="#99e6de"/>
  <rect x="154" y="204" width="120" height="11" rx="5.5" fill="#99e6de"/>

  <!-- Flow connector line from document right edge -->
  <rect x="344" y="214" width="52" height="12" rx="6" fill="white" opacity="0.55"/>

  <!-- Arrow head at the end of flow -->
  <path d="M376 198 L400 220 L376 242" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Small AI spark / note result card (bottom right, slightly overlapping) -->
  <rect x="220" y="292" width="172" height="116" rx="18" fill="#0f6b60"/>
  <rect x="220" y="292" width="172" height="116" rx="18" fill="url(#cardlight)" opacity="0.25"/>

  <!-- Lines on the result card -->
  <rect x="240" y="318" width="96" height="9" rx="4.5" fill="white" opacity="0.9"/>
  <rect x="240" y="338" width="72" height="9" rx="4.5" fill="white" opacity="0.6"/>
  <rect x="240" y="358" width="84" height="9" rx="4.5" fill="white" opacity="0.45"/>

  <!-- Small star/spark icon on the result card (AI indicator) -->
  <circle cx="356" cy="316" r="12" fill="white" opacity="0.18"/>
  <path d="M356 308 L357.8 313.4 L363.4 313.4 L359 316.8 L360.8 322.2 L356 319 L351.2 322.2 L353 316.8 L348.6 313.4 L354.2 313.4 Z" fill="white" opacity="0.9"/>

  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1aa396"/>
      <stop offset="100%" stop-color="#0f6b60"/>
    </linearGradient>
    <linearGradient id="toplight" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardlight" x1="220" y1="292" x2="392" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
